name: Release

on:
    push:
        tags:
            - "*"

permissions:
    contents: write
    id-token: write
    attestations: write

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: "npm"

            - run: npm ci

            - run: npm run build

            - name: Attest main.js
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: main.js

            - name: Attest styles.css
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: styles.css

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      main.js
                      styles.css
                      manifest.json